name = "nexttrainworker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["* * * * *"]

[[kv_namespaces]]
binding = "SCHEDULE_KV"
id = "df8cce3477aa40f3a473f618d7fcb343"
preview_id = "3c50290fbef540bb83e9c2018ec3ab70"

[[r2_buckets]]
binding = "ARRIVALS_R2"
bucket_name = "nexttrainworker-arrivals"
preview_bucket_name = "nexttrainworker-arrivals-preview"

[observability.logs]
enabled = true
invocation_logs = true
