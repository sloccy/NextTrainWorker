name: Build GTFS Schedule

on:
  schedule:
    - cron: '0 4,16 * * *'  # 4am + 4pm UTC daily; baseline window is 24h (12h overlap)
  workflow_dispatch:       # manual trigger for initial seed and ad-hoc rebuilds

permissions:
  contents: write

jobs:
  build-schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build schedule + upload stations.bin to R2
        run: npx tsx scripts/seed-schedule.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker with bundled baseline
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Commit regenerated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet src/baseline.generated.ts; then
            echo "No baseline changes to commit."
          else
            git add src/baseline.generated.ts
            git commit -m "chore: regenerate baseline.generated.ts"
            git push
          fi
