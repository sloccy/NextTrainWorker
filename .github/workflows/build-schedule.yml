name: Build GTFS Schedule

on:
  schedule:
    - cron: '0 4,16 * * *'  # 4am + 4pm UTC daily; baseline window is 24h (12h overlap)
  workflow_dispatch:       # manual trigger for initial seed and ad-hoc rebuilds

jobs:
  build-schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build schedule and emit bundled template + stations
        run: npx tsx scripts/seed-schedule.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker with bundled template
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
