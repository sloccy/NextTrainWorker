name: PR CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Stub generated files
        run: |
          mkdir -p src/worker/generated
          cat > src/worker/generated/offsets.ts << 'EOF'
          export const TEMPLATE_BYTES: Uint8Array = new Uint8Array();
          export const TRIP_OFFSETS: ReadonlyMap<string, Uint32Array> = new Map<string, Uint32Array>();
          export const STOP_OFFSETS: ReadonlyMap<string, ReadonlyMap<string, Uint32Array>> = new Map<string, Map<string, Uint32Array>>();
          EOF
          echo 'export const STATIONS_BYTES: Uint8Array = new Uint8Array();' > src/worker/generated/stations.ts
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
